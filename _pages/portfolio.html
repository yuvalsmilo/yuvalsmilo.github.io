{% include custom-header.html %}

<style>
  .page__title { display: none !important; }

  /* Hero — true screen-width, compensates for any theme container offset */
  .port-hero-wrap {
    margin-top: 33vh;
    margin-left: calc(-50vw + 50%);
    width: 100vw;
    height: 67vh;
    position: relative;
    overflow: hidden;
  }

  .port-hero {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(0.7);
  }

  /* Title — larger, left-aligned, in a transparent oval pill */
  .port-hero-title {
    position: absolute;
    bottom: 48px;
    left: 60px;
    color: #ffffff;
    font-size: 1.5em;
    font-weight: 400;
    line-height: 1.5;
    text-align: left;
    margin: 0;
    padding: 18px 36px;
    background: rgba(0, 0, 0, 0.28);
    border-radius: 60px;
    backdrop-filter: blur(2px);
    max-width: 520px;
  }

  /* Rest of projects list */
  .port-list {
    padding: 48px 60px 80px 60px;
  }
</style>

<div class="port-hero-wrap">
  <img class="port-hero" src="/images/hs_gullise.jpg" alt="">
  <p class="port-hero-title">Landscape evolution of ephemeral catchments</p>
</div>

<div class="port-list">
  {% include base_path %}
  {% for post in site.portfolio %}
    {% include archive-single.html %}
  {% endfor %}
</div>
