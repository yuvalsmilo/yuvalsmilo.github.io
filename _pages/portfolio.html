permalink: /portfolio/
author_profile: false

{% include custom-header.html %}

<style>
  .page__title { display: none !important; }

  /* Hero — full-width below fixed header */
  .port-hero-wrap {
    margin-top: 33vh;
    width: 100vw;
    height: 67vh;
    position: relative;
    overflow: hidden;
  }

  .port-hero {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(0.7);
  }

  /* Title overlaid on right side of hero */
  .port-hero-title {
    position: absolute;
    top: 50%;
    right: 60px;
    transform: translateY(-50%);
    color: #ffffff;
    font-size: 1em;
    font-weight: 400;
    max-width: 320px;
    text-align: right;
    line-height: 1.5;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    margin: 0;
  }

  /* Rest of projects list */
  .port-list {
    padding: 48px 60px 80px 60px;
  }

  .port-list h2 {
    font-size: 1em;
    font-weight: 600;
    margin-bottom: 32px;
    color: #333;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
</style>

<div class="port-hero-wrap">
  <img class="port-hero" src="/images/hs_gullise.jpg" alt="Landscape evolution of ephemeral catchments">
  <p class="port-hero-title">Landscape evolution of ephemeral catchments</p>
</div>

<div class="port-list">
  {% include base_path %}
  {% for post in site.portfolio %}
    {% include archive-single.html %}
  {% endfor %}
</div>
